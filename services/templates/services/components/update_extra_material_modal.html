<!-- Update Extra Material Modal -->
<div id="updateExtraMaterialModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm p-4">
    <div class="w-full max-w-md rounded-lg bg-white p-6 shadow-xl">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-gray-800">Update Extra Material</h3>
            <button onclick="closeUpdateExtraMaterialModal()" class="text-gray-400 hover:text-gray-600 transition">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form id="updateExtraMaterialForm" method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="update_em_material_name" class="block text-xs font-medium text-gray-600 mb-1">Material Name <span class="text-red-500">*</span></label>
                    <input id="update_em_material_name" name="material_name" required placeholder="e.g., PVC Pipe 2 inch"
                           class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-400 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="update_em_quantity" class="block text-xs font-medium text-gray-600 mb-1">Quantity <span class="text-red-500">*</span></label>
                        <input id="update_em_quantity" name="quantity" type="number" min="1" required placeholder="1"
                               class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-400 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500">
                    </div>
                    <div>
                        <label for="update_em_unit_cost" class="block text-xs font-medium text-gray-600 mb-1">Unit Cost (&#8377;)</label>
                        <input id="update_em_unit_cost" name="unit_cost" type="number" min="0" step="0.01" placeholder="0.00"
                               class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-400 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500">
                    </div>
                </div>

                <div>
                    <label for="update_em_notes" class="block text-xs font-medium text-gray-600 mb-1">Notes</label>
                    <textarea id="update_em_notes" name="notes" rows="2" maxlength="255" placeholder="Any additional details..."
                              class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-400 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500 resize-none"></textarea>
                </div>

                <!-- Line Total Preview -->
                <div class="rounded-lg bg-gray-50 px-3 py-2">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-medium text-gray-500">Estimated Line Total</span>
                        <span id="update_em_line_total" class="text-sm font-semibold text-gray-800">hello</span>
                    </div>
                </div>
            </div>

            <div class="mt-5 flex gap-3">
                <button type="submit"
                        class="flex-1 rounded bg-gray-800 px-4 py-2.5 text-sm font-medium text-white hover:bg-gray-700 active:bg-gray-900 transition">
                    Save Changes
                </button>
                <button type="button" onclick="closeUpdateExtraMaterialModal()"
                        class="rounded border border-gray-300 px-4 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function openUpdateExtraMaterialModal(projectId, extraMaterialId, materialName, quantity, unitCost, notes) {
        const form = document.getElementById('updateExtraMaterialForm');
        form.action = `/services/project/${projectId}/extra-materials/${extraMaterialId}/update/`;

        document.getElementById('update_em_material_name').value = materialName;
        document.getElementById('update_em_quantity').value = quantity;
        document.getElementById('update_em_unit_cost').value = unitCost || '';
        document.getElementById('update_em_notes').value = notes || '';

        updateLineTotalPreview();

        const modal = document.getElementById('updateExtraMaterialModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeUpdateExtraMaterialModal() {
        const modal = document.getElementById('updateExtraMaterialModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function updateLineTotalPreview() {
        const quantity = parseFloat(document.getElementById('update_em_quantity').value) || 0;
        const unitCost = parseFloat(document.getElementById('update_em_unit_cost').value) || 0;
        const total = quantity * unitCost;
        document.getElementById('update_em_line_total').innerHTML = '&#8377;' + total.toFixed(2);
    }

    document.getElementById('updateExtraMaterialModal').addEventListener('click', function (e) {
        if (e.target === this) closeUpdateExtraMaterialModal();
    });

    document.getElementById('update_em_quantity').addEventListener('input', updateLineTotalPreview);
    document.getElementById('update_em_unit_cost').addEventListener('input', updateLineTotalPreview);
</script>

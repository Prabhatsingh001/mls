        class="pb-3 text-sm font-medium border-b-2 transition
        {% if tab == 'active' %}border-gray-800 text-gray-800{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">

    <a href="?tab=completed"
        class="pb-3 text-sm font-medium border-b-2 transition

    </a>
    </nav>
</div>

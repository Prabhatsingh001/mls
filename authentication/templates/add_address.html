{% extends "index.html" %}

{% block title %}Add Address - MLS{% endblock %}

{% block content %}
<div class="min-h-screen px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
	<div class="max-w-2xl mx-auto">
		<div class="flex items-center gap-4 mb-8">
			<a href="{% url 'a:profile' user_id=user.pk %}" class="text-gray-500 hover:text-gray-800 transition" title="Back to profile">
				<svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
					<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
				</svg>
			</a>
			<div>
				<h1 class="text-xl sm:text-2xl font-bold text-gray-800">Add Another Address</h1>
				<p class="text-sm text-gray-500">Save a secondary location for future service requests.</p>
			</div>
		</div>

		<div class="bg-white rounded-lg border border-gray-200 p-4 sm:p-6">
			<form method="post" class="space-y-5">
				{% csrf_token %}

				<div>
					<label for="street" class="block text-sm font-medium text-gray-700 mb-1">Street</label>
					<input type="text" name="street" id="street" required
								 class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
								 placeholder="House no, street, landmark">
				</div>

				<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
					<div>
						<label for="city" class="block text-sm font-medium text-gray-700 mb-1">City</label>
						<input type="text" name="city" id="city" required
									 class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
									 placeholder="City">
					</div>
					<div>
						<label for="state" class="block text-sm font-medium text-gray-700 mb-1">State</label>
						<input type="text" name="state" id="state" required
									 class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
									 placeholder="State">
					</div>
				</div>

				<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
					<div>
						<label for="postal_code" class="block text-sm font-medium text-gray-700 mb-1">Postal Code</label>
						<input type="text" name="postal_code" id="postal_code" required
									 class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
									 placeholder="Postal code">
					</div>
					<div>
						<label for="country" class="block text-sm font-medium text-gray-700 mb-1">Country</label>
						<input type="text" name="country" id="country" required
									 class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
									 placeholder="Country">
					</div>
				</div>

				<div class="flex flex-col sm:flex-row gap-3 pt-2">
					<button type="submit"
									class="rounded bg-gray-800 px-5 py-2.5 text-sm font-medium text-white hover:bg-gray-700 active:bg-gray-900 transition">
						Save Address
					</button>
					<a href="{% url 'a:profile' user_id=user.pk %}"
						 class="rounded border border-gray-300 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 text-center hover:bg-gray-50 transition">
						Cancel
					</a>
				</div>
			</form>
		</div>
	</div>
</div>
{% endblock %}

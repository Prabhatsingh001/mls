{% extends "index.html" %}

{% block title %}Sign in — MLS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <div class="w-full max-w-sm sm:max-w-md">
    <h2 class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-6">Sign in</h2>

    {% if error %}
    <div class="mb-4 rounded bg-red-50 border border-red-300 text-red-700 px-4 py-3 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <!-- Google Sign-In (placeholder — wire up with django-allauth or similar) -->
    <a href="{% url 'social:begin' 'google-oauth2' %}" class="flex items-center justify-center gap-3 w-full rounded border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
      <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <div class="relative my-5 sm:my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="bg-gray-50 px-2 text-gray-400">or</span>
      </div>
    </div>

    <!-- Email / Phone Tabs -->
    <div class="flex rounded border border-gray-300 overflow-hidden mb-5">
      <button type="button" id="tab-email"
              onclick="switchTab('email')"
              class="flex-1 py-2 text-sm font-medium transition {% if active_tab == 'phone' %}bg-white text-gray-700 hover:bg-gray-50{% else %}bg-gray-800 text-white{% endif %}">
        Email
      </button>
      <button type="button" id="tab-phone"
              onclick="switchTab('phone')"
              class="flex-1 py-2 text-sm font-medium transition {% if active_tab == 'phone' %}bg-gray-800 text-white{% else %}bg-white text-gray-700 hover:bg-gray-50{% endif %}">
        Phone Number
      </button>
    </div>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <input type="hidden" name="login_method" id="login_method" value="{{ active_tab|default:'email' }}">

      <!-- Email Field -->
      <div id="email-field" {% if active_tab == 'phone' %}class="hidden"{% endif %}>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" id="email"
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="you@example.com">
      </div>

      <!-- Phone Field -->
      <div id="phone-field" {% if active_tab != 'phone' %}class="hidden"{% endif %}>
        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <input type="tel" name="phone" id="phone"
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="+1 (555) 000-0000">
      </div>

      <div>
        <div class="flex items-center justify-between mb-1">
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <a href="{% url 'a:forgot-password' %}" class="text-xs text-gray-500 hover:text-gray-800 hover:underline">Forgot password?</a>
        </div>
        <input type="password" name="password" id="password" required
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="••••••••">
      </div>

      <button type="submit"
              class="w-full rounded bg-gray-800 px-4 py-2.5 text-sm font-medium text-white hover:bg-gray-700 active:bg-gray-900 transition">
        Sign in
      </button>
    </form>

    <p class="mt-5 sm:mt-6 text-center text-sm text-gray-500">
      Don't have an account?
      <a href="{% url 'a:register' %}" class="text-gray-800 font-medium hover:underline">Register</a>
    </p>
  </div>
</div>

<script>
  function switchTab(tab) {
    const emailField = document.getElementById('email-field');
    const phoneField = document.getElementById('phone-field');
    const tabEmail = document.getElementById('tab-email');
    const tabPhone = document.getElementById('tab-phone');
    const emailInput = document.getElementById('email');
    const phoneInput = document.getElementById('phone');
    const loginMethod = document.getElementById('login_method');

    if (tab === 'email') {
      emailField.classList.remove('hidden');
      phoneField.classList.add('hidden');
      emailInput.required = true;
      phoneInput.required = false;
      phoneInput.value = '';
      loginMethod.value = 'email';

      tabEmail.classList.add('bg-gray-800', 'text-white');
      tabEmail.classList.remove('bg-white', 'text-gray-700', 'hover:bg-gray-50');
      tabPhone.classList.remove('bg-gray-800', 'text-white');
      tabPhone.classList.add('bg-white', 'text-gray-700', 'hover:bg-gray-50');
    } else {
      phoneField.classList.remove('hidden');
      emailField.classList.add('hidden');
      phoneInput.required = true;
      emailInput.required = false;
      emailInput.value = '';
      loginMethod.value = 'phone';

      tabPhone.classList.add('bg-gray-800', 'text-white');
      tabPhone.classList.remove('bg-white', 'text-gray-700', 'hover:bg-gray-50');
      tabEmail.classList.remove('bg-gray-800', 'text-white');
      tabEmail.classList.add('bg-white', 'text-gray-700', 'hover:bg-gray-50');
    }
  }
</script>
{% endblock %}

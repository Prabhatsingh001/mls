{% extends "index.html" %}

{% block title %}Reset Password — MLS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <div class="w-full max-w-sm sm:max-w-md">
    <h2 class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-2">Reset Password</h2>
    <p class="text-center text-sm text-gray-500 mb-6">Choose a strong new password and enter it twice to confirm. Once submitted, you can sign in with your new password right away.</p>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input type="password" name="password" id="password" required
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="••••••••">
      </div>

      <div>
        <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
        <input type="password" name="confirm-password" id="confirm-password" required
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="••••••••">
      </div>

      <button type="submit"
              class="w-full rounded bg-gray-800 px-4 py-2.5 text-sm font-medium text-white hover:bg-gray-700 active:bg-gray-900 transition">
        Reset Password
      </button>
    </form>

    <p class="mt-5 sm:mt-6 text-center text-sm text-gray-500">
      Back to
      <a href="{% url 'a:login' %}" class="text-gray-800 font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}

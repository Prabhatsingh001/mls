{% extends "index.html" %}

{% block title %}Change Password — MLS{% endblock %}

{% block content %}
<div class="min-h-screen px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <div class="max-w-md mx-auto">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
      <a href="{% url 'a:profile' user_id=user.pk %}" class="text-gray-500 hover:text-gray-800 transition" title="Back to profile">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
        </svg>
      </a>
      <h1 class="text-xl sm:text-2xl font-bold text-gray-800">Change Password</h1>
    </div>

    <!-- User context -->
    <div class="flex items-center gap-3 mb-6">
      <div class="h-10 w-10 rounded-full bg-gray-800 flex items-center justify-center shrink-0">
        <span class="text-sm font-bold text-white">{{ user.full_name|make_list|first|upper }}</span>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-800">{{ user.full_name }}</p>
        <p class="text-xs text-gray-500">{{ user.email }}</p>
      </div>
    </div>

    <form method="post" id="password-form" class="space-y-5">
      {% csrf_token %}

      <!-- New Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input type="password" name="password" id="password" required
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="••••••••">
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
        <input type="password" name="confirm-password" id="confirm-password" required
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="••••••••">
      </div>

      <!-- Buttons -->
      <div class="flex flex-col sm:flex-row gap-3 pt-2">
        <button type="submit"
                class="rounded bg-gray-800 px-5 py-2.5 text-sm font-medium text-white hover:bg-gray-700 active:bg-gray-900 transition">
          Update Password
        </button>
        <a href="{% url 'a:profile' user_id=user.pk %}"
           class="rounded border border-gray-300 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 text-center hover:bg-gray-50 transition">
          Cancel
        </a>
      </div>
    </form>

  </div>
</div>

<script>
  document.getElementById('password-form').addEventListener('submit', function (e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    if (password !== confirm) {
      e.preventDefault();
      document.getElementById('password').value = '';
      document.getElementById('confirm-password').value = '';
      showToast('Passwords do not match.', 'error');
    }
  });
</script>
{% endblock %}

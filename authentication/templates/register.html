{% extends "index.html" %}

{% block title %}Register — MLS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <div class="w-full max-w-sm sm:max-w-md">
    <h2 class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-6">Create an account</h2>

    <!-- Google Sign-Up (placeholder — wire up with django-allauth or similar) -->
    <a href="#" class="flex items-center justify-center gap-3 w-full rounded border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
      <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign up with Google
    </a>

    <div class="relative my-5 sm:my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="bg-gray-50 px-2 text-gray-400">or</span>
      </div>
    </div>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" name="full_name" id="full_name" required
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="John Doe">
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" id="email" required
               class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
               placeholder="you@example.com">
      </div>

      <div>
        <label for="role" class="block text-sm font-medium text-gray-700 mb-1">I am a</label>
        <select name="role" id="role" required
                class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent">
          {% for value, label in roles %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" id="password" required
                 class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
                 placeholder="••••••••">
        </div>
        <div>
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" name="confirm_password" id="confirm_password" required
                 class="w-full rounded border border-gray-300 px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 focus:border-transparent"
                 placeholder="••••••••">
        </div>
      </div>

      <button type="submit"
              class="w-full rounded bg-gray-800 px-4 py-2.5 text-sm font-medium text-white hover:bg-gray-700 active:bg-gray-900 transition">
        Register
      </button>
    </form>

    <p class="mt-5 sm:mt-6 text-center text-sm text-gray-500">
      Already have an account?
      <a href="{% url 'a:login' %}" class="text-gray-800 font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>

<script>
  document.querySelector('form').addEventListener('submit', function (e) {
    let password = document.getElementById('password').value;
    let confirmPassword = document.getElementById('confirm_password').value;
    if (password !== confirmPassword) {
      e.preventDefault();
      document.getElementById('password').value = '';
      document.getElementById('confirm_password').value = '';
      showToast('Passwords do not match.', 'error');
    }
  });
</script>
{% endblock %}

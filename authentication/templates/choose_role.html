{% extends "index.html" %}

{% block title %}Choose Your Role — MLS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <div class="w-full max-w-sm sm:max-w-md">

    <h2 class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-2">Choose Your Role</h2>
    <p class="text-center text-sm text-gray-500 mb-8">Select how you'd like to use MLS. You can change this later from your profile.</p>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <!-- Customer Card -->
      <label class="role-card group block cursor-pointer rounded-lg border-2 border-gray-200 bg-white p-5 transition hover:border-gray-800 hover:shadow-sm">
        <input type="radio" name="role" value="CUST" class="hidden peer" checked>
        <div class="flex items-start gap-4">
          <!-- Icon -->
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-gray-100 text-gray-600 group-hover:bg-gray-800 group-hover:text-white peer-checked:group-[]:bg-gray-800 peer-checked:group-[]:text-white transition">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
            </svg>
          </div>
          <div>
            <span class="text-sm font-semibold text-gray-800">Customer</span>
            <p class="mt-0.5 text-xs text-gray-500">Browse and book services, manage your appointments, and track service history.</p>
          </div>
          <!-- Check indicator -->
          <div class="ml-auto hidden shrink-0 peer-checked:group-[]:block">
            <svg class="h-5 w-5 text-gray-800" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/>
            </svg>
          </div>
        </div>
      </label>

      <!-- Technician Card -->
      <label class="role-card group block cursor-pointer rounded-lg border-2 border-gray-200 bg-white p-5 transition hover:border-gray-800 hover:shadow-sm">
        <input type="radio" name="role" value="TECH" class="hidden peer">
        <div class="flex items-start gap-4">
          <!-- Icon -->
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-gray-100 text-gray-600 group-hover:bg-gray-800 group-hover:text-white peer-checked:group-[]:bg-gray-800 peer-checked:group-[]:text-white transition">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.049.58.025 1.193-.14 1.743"/>
            </svg>
          </div>
          <div>
            <span class="text-sm font-semibold text-gray-800">Technician</span>
            <p class="mt-0.5 text-xs text-gray-500">Offer your skills and services, manage work orders, and grow your business.</p>
          </div>
          <!-- Check indicator -->
          <div class="ml-auto hidden shrink-0 peer-checked:group-[]:block">
            <svg class="h-5 w-5 text-gray-800" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/>
            </svg>
          </div>
        </div>
      </label>

      <button type="submit"
              class="w-full rounded bg-gray-800 px-4 py-2.5 text-sm font-medium text-white hover:bg-gray-700 active:bg-gray-900 transition mt-2">
        Continue
      </button>
    </form>

  </div>
</div>

<script>
    // Highlight selected card's border
    document.querySelectorAll('.role-card input[type="radio"]').forEach(function (radio) {
        radio.addEventListener('change', function () {
        document.querySelectorAll('.role-card').forEach(function (card) {
            card.classList.remove('border-gray-800');
            card.classList.add('border-gray-200');
        });
        if (this.checked) {
            this.closest('.role-card').classList.remove('border-gray-200');
            this.closest('.role-card').classList.add('border-gray-800');
        }
        });
    });

    // Trigger on load for the default-checked radio
    const checked = document.querySelector('.role-card input[type="radio"]:checked');
    if (checked) {
        checked.closest('.role-card').classList.remove('border-gray-200');
        checked.closest('.role-card').classList.add('border-gray-800');
    }
</script>
{% endblock %}

<div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
    <div class="rounded-lg border border-gray-200 bg-white p-4 text-center">
        <p class="text-2xl font-bold text-gray-800">{{ stats.total_requests }}</p>
        <p class="mt-1 text-xs text-gray-500">Total Requests</p>
    </div>
    <div class="rounded-lg border border-gray-200 bg-white p-4 text-center">
        <p class="text-2xl font-bold text-yellow-600">{{ stats.pending_requests }}</p>
        <p class="mt-1 text-xs text-gray-500">Pending Review</p>
    </div>
    <div class="rounded-lg border border-gray-200 bg-white p-4 text-center">
        <p class="text-2xl font-bold text-blue-600">{{ stats.active_projects }}</p>
        <p class="mt-1 text-xs text-gray-500">Active Projects</p>
    </div>
    <div class="rounded-lg border border-gray-200 bg-white p-4 text-center">
        <p class="text-2xl font-bold text-emerald-600">{{ stats.completed_projects }}</p>
        <p class="mt-1 text-xs text-gray-500">Completed</p>
    </div>
    <div class="rounded-lg border border-gray-200 bg-white p-4 text-center">
        <p class="text-2xl font-bold text-red-600">{{ stats.cancelled_projects }}</p>
        <p class="mt-1 text-xs text-gray-500">Cancelled</p>
    </div>
</div>

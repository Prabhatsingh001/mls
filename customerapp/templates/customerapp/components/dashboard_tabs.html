<div class="border-b border-gray-200 mb-6">

    <!-- Mobile: hamburger + active tab label -->
    <div class="flex items-center justify-between md:hidden py-2">
        <span class="text-sm font-medium text-gray-800">
            {% if tab == 'services' %}Browse Services
            {% elif tab == 'my-requests' %}My Requests
            {% elif tab == 'my-projects' %}My Projects
            {% elif tab == 'invoices' %}Invoices
            {% else %}Dashboard
            {% endif %}
        </span>
        <button id="cust-tab-toggle" type="button"
                class="inline-flex items-center justify-center rounded p-2 text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition"
                aria-expanded="false" aria-label="Toggle tabs">
            <svg id="cust-tab-open" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            <svg id="cust-tab-close" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <!-- Mobile: collapsible dropdown -->
    <div id="cust-tab-menu" class="md:hidden hidden border-t border-gray-100 pb-2">
        <div class="flex flex-col gap-1 pt-2">
            <a href="?tab=services"
                class="rounded px-3 py-2 text-sm font-medium transition
                {% if tab == 'services' %}bg-gray-100 text-gray-800{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-700{% endif %}">
                Browse Services
            </a>
            <a href="?tab=my-requests"
                class="rounded px-3 py-2 text-sm font-medium transition
                {% if tab == 'my-requests' %}bg-gray-100 text-gray-800{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-700{% endif %}">
                My Requests
            </a>
            <a href="?tab=my-projects"
                class="rounded px-3 py-2 text-sm font-medium transition
                {% if tab == 'my-projects' %}bg-gray-100 text-gray-800{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-700{% endif %}">
                My Projects
            </a>
            <a href="?tab=invoices"
                class="rounded px-3 py-2 text-sm font-medium transition
                {% if tab == 'invoices' %}bg-gray-100 text-gray-800{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-700{% endif %}">
                Invoices
            </a>
        </div>
    </div>

    <!-- Desktop: horizontal tab bar -->
    <nav class="hidden md:flex gap-6 -mb-px" aria-label="Tabs">
        <a href="?tab=services"
            class="pb-3 text-sm font-medium border-b-2 transition
            {% if tab == 'services' %}border-gray-800 text-gray-800
            {% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300
            {% endif %}">
            Browse Services
        </a>
        <a href="?tab=my-requests"
            class="pb-3 text-sm font-medium border-b-2 transition
            {% if tab == 'my-requests' %}border-gray-800 text-gray-800
            {% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300
            {% endif %}">
            My Requests
        </a>
        <a href="?tab=my-projects"
            class="pb-3 text-sm font-medium border-b-2 transition
            {% if tab == 'my-projects' %}border-gray-800 text-gray-800
            {% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300
            {% endif %}">
            My Projects
        </a>
        <a href="?tab=invoices"
            class="pb-3 text-sm font-medium border-b-2 transition
            {% if tab == 'invoices' %}border-gray-800 text-gray-800
            {% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300
            {% endif %}">
            Invoices
        </a>
    </nav>
</div>

<script>
(function() {
    var toggle = document.getElementById('cust-tab-toggle');
    var menu = document.getElementById('cust-tab-menu');
    var openIcon = document.getElementById('cust-tab-open');
    var closeIcon = document.getElementById('cust-tab-close');

    toggle.addEventListener('click', function() {
        menu.classList.toggle('hidden');
        openIcon.classList.toggle('hidden');
        closeIcon.classList.toggle('hidden');
        toggle.setAttribute('aria-expanded', !menu.classList.contains('hidden'));
    });
})();
</script>

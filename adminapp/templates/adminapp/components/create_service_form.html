<!-- Create Service Form -->
<div class="rounded-lg border border-gray-200 bg-white p-6 mb-6">
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Create New Service</h2>
    <form method="post" action="{% url 'adminapp:admin-create-service' %}">
    {% csrf_token %}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Category select -->
        <div>
        <label for="category" class="block text-xs font-medium text-gray-600 mb-1">Category</label>
        <select id="category" name="category"
                class="w-full rounded border border-gray-300 bg-white px-3 py-2 text-sm text-gray-800 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500">
            <option value="">— Select existing category —</option>
            {% for cat in categories %}
            <option value="{{ cat.pk }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
        </div>
        <!-- New category -->
        <div>
        <label for="new_category" class="block text-xs font-medium text-gray-600 mb-1">Or New Category</label>
        <input type="text" id="new_category" name="new_category" placeholder="e.g., Pool Maintenance"
                class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-400 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500">
        </div>
        <!-- Title -->
        <div>
        <label for="title" class="block text-xs font-medium text-gray-600 mb-1">Service Title <span class="text-red-500">*</span></label>
        <input type="text" id="title" name="title" required placeholder="e.g., Pipe Leak Repair"
                class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-400 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500">
        </div>
        <!-- Base price -->
        <div>
        <label for="base_price" class="block text-xs font-medium text-gray-600 mb-1">Base Price ($) <span class="text-red-500">*</span></label>
        <input type="number" step="0.01" min="0" id="base_price" name="base_price" required placeholder="0.00"
                class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-400 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500">
        </div>
        <!-- Description -->
        <div class="sm:col-span-2">
        <label for="description" class="block text-xs font-medium text-gray-600 mb-1">Description</label>
        <textarea id="description" name="description" rows="2" placeholder="Brief description of the service…"
                    class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder:text-gray-400 focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-500 resize-none"></textarea>
        </div>
    </div>
    <div class="mt-4">
        <button type="submit"
                class="rounded bg-gray-800 px-5 py-2.5 text-sm font-medium text-white hover:bg-gray-700 active:bg-gray-900 transition">
        Create Service
        </button>
    </div>
    </form>
</div>
